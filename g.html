<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <title>Boss Battle - Kiếm Khí Hủy Diệt</title>
    <link rel="icon" href="data:," />
    <style>
      body {
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: #1a1a1a;
        font-family: sans-serif;
        overflow: hidden;
      }
      canvas {
        background: #333;
        border: 4px solid #555;
        box-shadow: 0 0 30px rgba(0, 0, 0, 0.7);
      }
      .ui {
        position: absolute;
        top: 15px;
        color: white;
        text-align: center;
        pointer-events: none;
        font-size: 18px;
        line-height: 1.5;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      }
      .hotkey {
        color: #ffcc00;
        font-weight: bold;
      }
      video {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="ui">
      Mũi tên: Di chuyển | Click: Chém |
      <span class="hotkey">Shift: Đỡ (Parry Kiếm Khí tạo Giáp ảo)</span> |
      <span class="hotkey">F: Hóa Thần (Cần 5 nội tại)</span> |
      <span class="hotkey">Q: Kiếm Khí</span>
    </div>
    <canvas id="gameCanvas" width="1600" height="800"></canvas>

    <video id="vIdle" src="b.mp4" loop muted playsinline></video>
    <video id="vWalk" src="k.mp4" loop muted playsinline></video>
    <video id="vBossSkill" src="bossc.mp4" muted playsinline></video>

    <script>
      const canvas = document.getElementById("gameCanvas");
      const ctx = canvas.getContext("2d");
      const vIdle = document.getElementById("vIdle");
      const vWalk = document.getElementById("vWalk");
      const vBossSkill = document.getElementById("vBossSkill");

      const offscreenCanvas = document.createElement("canvas");
      const offCtx = offscreenCanvas.getContext("2d", {
        willReadFrequently: true,
      });
      offscreenCanvas.width = 180;
      offscreenCanvas.height = 180;

      const bossOffscreenCanvas = document.createElement("canvas");
      const bossOffCtx = bossOffscreenCanvas.getContext("2d", {
        willReadFrequently: true,
      });
      bossOffscreenCanvas.width = 225;
      bossOffscreenCanvas.height = 225;

      const sources = {
        game_map: "https://img.upanhnhanh.com/620b7b80b25560e375b6732afc01f7cc",
        p_idle: "https://img.upanhnhanh.com/5f010dcb315d774cb692e5ffa7d3859b",
        p_walk1: "https://img.upanhnhanh.com/36a937b8709157e2bbeefafc845f8440",
        p_walk2: "https://img.upanhnhanh.com/77f52381583f2cde6caa0951e4d34f88",
        p_atk1: "https://img.upanhnhanh.com/c551c6874d3626033d49ebf62a93d486",
        p_atk2: "https://img.upanhnhanh.com/50575fb50952f113fb694138d678d84c",
        p_atk_alt:
          "https://img.upanhnhanh.com/1aa540166c14bb0ec54cb2c499e563c0",
        p_parry_start:
          "https://img.upanhnhanh.com/227f6ed5c34ab7e59e114ef589273aad",
        p_parry_main:
          "https://img.upanhnhanh.com/a469ec7e0e4cfe418c9b478d1e89dd0b",
        p_counter:
          "https://img.upanhnhanh.com/0518b932dca64def8be53ee332fe0986",
        p_idleL: "https://img.upanhnhanh.com/70123db3f893d58f1b16dc471ce004e9",
        p_walkL1: "https://img.upanhnhanh.com/48fe462200d8d7c1667a31bdf8d8b1c1",
        p_walkL2: "https://img.upanhnhanh.com/6a477468d26746d0dcd7238023cfc13a",
        p_awaken_atk:
          "https://img.upanhnhanh.com/82237553b837fca28499c46f7f51c588",
        p_cast_q: "https://img.upanhnhanh.com/873c67aec60f71a33c065fcfa91bdea0",
        p_projectile:
          "https://img.upanhnhanh.com/680ce958f231d75cfe895a73c7930ad8",
        p_jump_prep:
          "https://img.upanhnhanh.com/de035e1292cea15e05d4606e94ca8f5d",
        p_jump_air:
          "https://img.upanhnhanh.com/514a3a963dda6f9eee7c578b7e69e320",
        p_jump_atk:
          "https://img.upanhnhanh.com/bfca31999a8487a48f50c42988c15b50",
        p_awaken_jump_prep:
          "https://img.upanhnhanh.com/a12fd978e675e3dc36d7f3051aff04d6",
        p_awaken_jump_air:
          "https://img.upanhnhanh.com/3ebd90e31f2a3db0776a977afd895008",
        p_awaken_jump_atk:
          "https://img.upanhnhanh.com/f1046ed0f911ce7b365f7ad7ba83b9ee",
        b_idle: "https://img.upanhnhanh.com/dc37773a408c7f2a06cfb5ce1eb93806",
        b_walk: "https://img.upanhnhanh.com/d2297a44ee8c194fc7d817e214dd8ce5",
        b_charge: "https://img.upanhnhanh.com/9a7c08598a46928f360a40ee1ae29f41",
        b_atk: "https://img.upanhnhanh.com/c140db78fc011940ba2478c877f984cb",
        b_armor: "https://img.upanhnhanh.com/5757c0fdfe8ddfeacacdc60c068d0179",
        b_skill_atk:
          "https://img.upanhnhanh.com/d8e81a377a55942fd8d6638234c2c64a",
      };

      const imgs = {};
      let loaded = 0;
      for (let k in sources) {
        imgs[k] = new Image();
        imgs[k].src = sources[k];
        imgs[k].onload = () => loaded++;
      }

      const player = {
        x: 150,
        y: 550,
        w: 140,
        h: 180,
        speed: 5.5,
        hp: 100,
        greyHp: 0, // Thêm greyHp
        stamina: 100,
        maxStamina: 100,
        staminaRegen: 0.1,
        dir: "right",
        isMoving: false,
        isAtk: false,
        atkFrame: 0,
        atkType: 1,
        atkReady: true,
        isParrying: false,
        parryState: "none",
        isCountering: false,
        parryReady: true,
        vy: 0,
        vx: 0,
        gravity: 0.9,
        jumpPower: -26,
        isJumping: false,
        groundY: 550,
        isPreparingJump: false,
        isAirAtk: false,
        jumpDelay: false,
        isFrozen: false,
        hasDealtDamage: false,
        innerEnergy: 0,
        isAwakened: false,
        isCastingQ: false,
        lastGreyHpTime: 0,
      };

      const boss = {
        x: 1200,
        y: 480,
        w: 200,
        h: 250,
        speed: 3.8,
        hp: 500,
        maxHp: 500,
        greyHp: 0,
        dir: "left",
        state: "idle",
        atkRange: 180,
        cooldown: false,
        skillCooldown: false, // Quản lý hồi chiêu skill
        hasDealtDamage: false,
        vx: 0,
        isStunned: false,
        isShielded: false,
        shieldAlpha: 0,
        canShield: true,
        lastHitTime: 0,
      };

      const projectiles = [];
      const bossProjectiles = [];
      const keys = {};

      function drawVideoTransparent(video) {
        offCtx.clearRect(0, 0, 180, 180);
        offCtx.drawImage(video, 0, 0, 180, 180);
        let frame = offCtx.getImageData(0, 0, 180, 180);
        for (let i = 0; i < frame.data.length / 4; i++) {
          let r = frame.data[i * 4 + 0],
            g = frame.data[i * 4 + 1],
            b = frame.data[i * 4 + 2];
          if (g > 100 && g > r * 1.2 && g > b * 1.2) frame.data[i * 4 + 3] = 0;
        }
        offCtx.putImageData(frame, 0, 0);
        return offscreenCanvas;
      }

      function drawBossVideoTransparent(video) {
        bossOffCtx.clearRect(0, 0, 225, 225);
        bossOffCtx.drawImage(video, 0, 0, 225, 225);
        let frame = bossOffCtx.getImageData(0, 0, 225, 225);
        for (let i = 0; i < frame.data.length / 4; i++) {
          let r = frame.data[i * 4 + 0],
            g = frame.data[i * 4 + 1],
            b = frame.data[i * 4 + 2];
          if (g > 100 && g > r * 1.2 && g > b * 1.2) frame.data[i * 4 + 3] = 0;
        }
        bossOffCtx.putImageData(frame, 0, 0);
        return bossOffscreenCanvas;
      }

      window.addEventListener("keydown", (e) => {
        keys[e.code] = true;
        if (
          (e.code === "ArrowUp" || e.code === "Space" || e.code === "KeyW") &&
          !player.isJumping &&
          !player.isPreparingJump &&
          !player.jumpDelay &&
          player.hp > 0
        ) {
          player.isPreparingJump = true;
          setTimeout(() => {
            player.isPreparingJump = false;
            player.isJumping = true;
            player.vy = player.jumpPower;
            player.jumpDelay = true;
            setTimeout(() => (player.jumpDelay = false), 800);
          }, 150);
        }
        if (
          e.code === "KeyF" &&
          player.innerEnergy >= 5 &&
          !player.isAwakened
        ) {
          player.isAwakened = true;
          player.innerEnergy = 0;
          player.staminaRegen = 0.6;
          vIdle.play();
          vWalk.play();
          setTimeout(() => {
            player.isAwakened = false;
            player.staminaRegen = 0.1;
            vIdle.pause();
            vWalk.pause();
          }, 8000);
        }
        if (
          e.code === "KeyQ" &&
          player.isAwakened &&
          !player.isCastingQ &&
          player.stamina >= 60
        ) {
          player.isCastingQ = true;
          player.stamina -= 60;
          setTimeout(() => {
            projectiles.push({
              x: player.dir === "right" ? player.x + 80 : player.x - 80,
              y: player.y + 30,
              w: 160,
              h: 100,
              speed: player.dir === "right" ? 14 : -14,
              dist: 0,
              maxDist: canvas.width * 0.4,
              alpha: 1,
              dir: player.dir,
            });
            player.isCastingQ = false;
          }, 300);
        }
        if (
          (e.code === "ShiftLeft" || e.code === "ShiftRight") &&
          player.parryReady &&
          !player.isAtk &&
          player.stamina >= 15
        )
          startParrySequence();
      });

      window.addEventListener("keyup", (e) => (keys[e.code] = false));

      canvas.addEventListener("mousedown", () => {
        if (
          player.hp <= 0 ||
          !player.atkReady ||
          player.isCastingQ ||
          player.isPreparingJump
        )
          return;
        let cost = player.isAwakened ? 70 : 45;
        if (player.stamina < cost) return;
        player.stamina -= cost;
        player.atkReady = false;
        player.hasDealtDamage = false;
        if (player.isJumping) {
          player.isAirAtk = true;
          setTimeout(() => {
            player.isAirAtk = false;
            player.atkReady = true;
          }, 500);
        } else {
          player.isAtk = true;
          player.atkType = Math.random() < 0.2 ? 2 : 1;
          setTimeout(() => (player.atkFrame = 1), 100);
          setTimeout(() => {
            player.isAtk = false;
            player.atkFrame = 0;
            player.atkReady = true;
          }, 300);
        }
      });

      function startParrySequence() {
        player.isParrying = true;
        player.parryReady = false;
        player.parryState = "start";
        setTimeout(() => {
          if (player.isParrying) player.parryState = "main";
        }, 200);
        setTimeout(() => {
          player.isParrying = false;
          player.parryState = "none";
        }, 800);
        setTimeout(() => {
          player.parryReady = true;
        }, 2800);
      }

      function toggleBossShield() {
        if (
          !boss.canShield ||
          boss.hp <= 0 ||
          boss.isStunned ||
          boss.state === "skill"
        )
          return;
        boss.isShielded = true;
        boss.canShield = false;
        boss.shieldAlpha = 0.4;
        setTimeout(() => {
          let fadeOut = setInterval(() => {
            boss.shieldAlpha -= 0.02;
            if (boss.shieldAlpha <= 0) {
              boss.shieldAlpha = 0;
              boss.isShielded = false;
              clearInterval(fadeOut);
              setTimeout(() => {
                boss.canShield = true;
              }, 4000);
            }
          }, 30);
        }, 2400);
      }

      function applyDamageToBoss(dmg) {
        if (boss.isShielded) {
          boss.greyHp += dmg;
          boss.hp -= dmg;
          boss.lastHitTime = Date.now();
        } else {
          boss.hp -= dmg;
          if (boss.canShield && Math.random() < 0.4) toggleBossShield();
        }
        if (player.isAwakened && player.hp < 100) {
          player.hp += dmg * 0.05;
          if (player.hp > 100) player.hp = 100;
        }
      }

      function triggerBossSkill() {
        if (
          boss.hp <= 0 ||
          boss.isStunned ||
          boss.state === "skill" ||
          boss.skillCooldown
        )
          return;

        // CHẶN HÀNH ĐỘNG KHÁC, TẮT KHIÊN
        boss.state = "skill";
        boss.isShielded = false;
        boss.shieldAlpha = 0;
        boss.skillCooldown = true;

        vBossSkill.currentTime = 0;
        vBossSkill.play();
        let fired = false;
        const check = setInterval(() => {
          if (!fired && vBossSkill.currentTime > vBossSkill.duration * 0.8) {
            bossProjectiles.push({
              x: boss.dir === "left" ? boss.x : boss.x + boss.w,
              y: boss.y - 20,
              w: 420,
              h: 250,
              speed: boss.dir === "left" ? -5 : 6,
              dist: 0,
              maxDist: canvas.width * 0.7,
              dir: boss.dir,
            });
            fired = true;
          }
          if (vBossSkill.ended) {
            clearInterval(check);
            boss.state = "idle";
            // 8 giây sau mới được random tiếp
            setTimeout(() => {
              boss.skillCooldown = false;
            }, 8000);
          }
        }, 16);
      }

      function update() {
        if (player.hp <= 0 || boss.hp <= 0) return;
        if (player.stamina < player.maxStamina)
          player.stamina += player.staminaRegen;
        if (player.isAwakened && player.hp < 100) player.hp += 0.01;

        // Hồi máu từ giáp ảo của Boss
        if (boss.greyHp > 0 && Date.now() - boss.lastHitTime > 1200) {
          let healRate = 0.4;
          boss.greyHp -= healRate;
          boss.hp += healRate;
          if (boss.greyHp < 0) boss.greyHp = 0;
        }

        // Hồi máu từ giáp ảo của Player (Parry Kiếm Khí)
        if (player.greyHp > 0 && Date.now() - player.lastGreyHpTime > 2000) {
          let hr = 0.2;
          player.greyHp -= hr;
          player.hp += hr;
          if (player.hp > 100) player.hp = 100;
        }

        if (
          !player.isAtk &&
          !player.isParrying &&
          !player.isCountering &&
          !player.isCastingQ &&
          !player.isPreparingJump &&
          !player.isFrozen
        ) {
          if (keys["KeyD"]) {
            player.x += player.speed;
            player.dir = "right";
            player.isMoving = true;
          } else if (keys["KeyA"]) {
            player.x -= player.speed;
            player.dir = "left";
            player.isMoving = true;
          } else player.isMoving = false;
        }
        if (!player.isFrozen && !player.isPreparingJump) {
          player.vy += player.gravity;
          player.y += player.vy;
        }
        if (player.y >= player.groundY) {
          player.y = player.groundY;
          player.vy = 0;
          player.isJumping = false;
          player.isAirAtk = false;
        }

        const bBody = { x: boss.x + 50, y: boss.y, w: 100, h: boss.h };
        const pBody = { x: player.x + 40, y: player.y, w: 60, h: player.h };

        if (checkRectCollision(pBody, bBody)) {
          if (pBody.x < bBody.x) player.x = bBody.x - 40 - pBody.w;
          else player.x = bBody.x + bBody.w - 40;
        }

        // AI BOSS CẬP NHẬT
        if (!(boss.hp <= 0 || boss.isStunned || boss.state === "skill")) {
          let dist = player.x + player.w / 2 - (boss.x + boss.w / 2);
          boss.dir = dist > 0 ? "right" : "left";

          // ĐIỀU KIỆN SKILL: Không đang chém, không lá chắn, tỉ lệ 1.5%
          if (
            !boss.skillCooldown &&
            !boss.isShielded &&
            boss.state !== "charge" &&
            boss.state !== "attack" &&
            Math.random() < 0.001
          ) {
            triggerBossSkill();
          } else if (!(boss.state === "charge" || boss.state === "attack")) {
            if (Math.abs(dist) > boss.atkRange) {
              boss.state = "walk";
              boss.x += (dist > 0 ? 1 : -1) * boss.speed;
            } else {
              if (!boss.cooldown) {
                boss.state = "charge";
                boss.hasDealtDamage = false;
                setTimeout(() => {
                  if (
                    boss.hp <= 0 ||
                    boss.isStunned ||
                    boss.state === "skill"
                  ) {
                    boss.state = "idle";
                    return;
                  }
                  boss.state = "attack";
                  setTimeout(() => {
                    if (
                      boss.hp <= 0 ||
                      boss.isStunned ||
                      boss.state === "skill"
                    ) {
                      boss.state = "idle";
                      return;
                    }
                    boss.state = "idle";
                    boss.hasDealtDamage = false;
                    setTimeout(() => {
                      if (
                        boss.hp <= 0 ||
                        boss.isStunned ||
                        boss.state === "skill"
                      ) {
                        boss.state = "idle";
                        return;
                      }
                      boss.state = "attack";
                      setTimeout(() => {
                        boss.state = "idle";
                        boss.cooldown = true;
                        setTimeout(() => (boss.cooldown = false), 2500);
                      }, 200);
                    }, 500);
                  }, 200);
                }, 400);
              } else boss.state = "idle";
            }
          }
        }

        projectiles.forEach((p, i) => {
          p.x += p.speed;
          p.dist += Math.abs(p.speed);
          p.alpha = 1 - p.dist / p.maxDist;
          if (checkRectCollision(p, bBody)) {
            applyDamageToBoss(40 * p.alpha);
            boss.vx = p.speed * 1.2;
            projectiles.splice(i, 1);
          } else if (p.dist >= p.maxDist) projectiles.splice(i, 1);
        });

        bossProjectiles.forEach((p, i) => {
          p.x += p.speed;
          p.dist += Math.abs(p.speed);
          if (checkRectCollision(p, pBody)) {
            if (player.isParrying) {
              // PARRY KIẾM KHÍ: Hiện lớp giáp ảo thay cho máu mất
              let damage = 45;
              player.hp -= damage;
              player.greyHp += damage;
              player.lastGreyHpTime = Date.now();
              player.vx = p.speed * 0.4;
            } else {
              player.hp -= 45;
              player.vx = p.speed * 0.7;
            }
            bossProjectiles.splice(i, 1);
          } else if (p.dist >= p.maxDist) bossProjectiles.splice(i, 1);
        });

        if (player.isAtk && player.atkFrame === 1 && !player.hasDealtDamage) {
          let atkRect = {
            x: player.dir === "right" ? player.x + 90 : player.x - 90,
            y: player.y,
            w: 140,
            h: player.h,
          };
          if (checkRectCollision(atkRect, bBody)) {
            applyDamageToBoss(
              player.isAwakened ? 45 : player.atkType === 2 ? 30 : 18,
            );
            boss.vx = player.dir === "right" ? 15 : -15;
            if (!player.isAwakened && player.innerEnergy < 5)
              player.innerEnergy++;
            player.hasDealtDamage = true;
          }
        }
        if (player.isAirAtk && !player.hasDealtDamage) {
          let airAtkRect = {
            x: player.dir === "right" ? player.x + 80 : player.x - 100,
            y: player.y + 20,
            w: 160,
            h: player.h,
          };
          if (checkRectCollision(airAtkRect, bBody)) {
            applyDamageToBoss(boss.maxHp * (player.isAwakened ? 0.25 : 0.15));
            player.isFrozen = true;
            player.vy = 0;
            boss.isStunned = true;
            setTimeout(() => {
              player.isFrozen = false;
            }, 500);
            setTimeout(() => {
              boss.isStunned = false;
            }, 100);
            boss.vx = player.dir === "right" ? 10 : -10;
            if (!player.isAwakened && player.innerEnergy < 5)
              player.innerEnergy++;
            player.hasDealtDamage = true;
          }
        }
        if (
          boss.state === "attack" &&
          !boss.hasDealtDamage &&
          !boss.isStunned
        ) {
          let bAtkRect = {
            x: boss.dir === "left" ? boss.x - 90 : boss.x + 90,
            y: boss.y,
            w: 160,
            h: boss.h,
          };
          if (checkRectCollision(bAtkRect, pBody)) {
            if (player.isParrying && player.stamina >= 45) {
              player.isParrying = false;
              player.isCountering = true;
              player.stamina -= 45;
              applyDamageToBoss(30);
              boss.vx = boss.dir === "left" ? 40 : -40;
              setTimeout(() => {
                player.isCountering = false;
              }, 400);
            } else {
              player.hp -= 25;
              player.vx = boss.dir === "left" ? -20 : 20;
            }
            boss.hasDealtDamage = true;
          }
        }

        player.vx *= 0.8;
        boss.vx *= 0.8;
        player.x += player.vx;
        boss.x += boss.vx;
        if (player.x < 0) player.x = 0;
        if (player.x > canvas.width - player.w)
          player.x = canvas.width - player.w;
        if (boss.x < 0) boss.x = 0;
        if (boss.x > canvas.width - boss.w) boss.x = canvas.width - boss.w;
      }

      function checkRectCollision(r1, r2) {
        return (
          r1.x < r2.x + r2.w &&
          r1.x + r1.w > r2.x &&
          r1.y < r2.y + r2.h &&
          r1.y + r1.h > r2.y
        );
      }

      function drawEntity(type, obj) {
        let imgKey,
          flip = false,
          useVideo = false,
          videoElement = null;
        let drawW = obj.w,
          drawH = obj.h,
          drawY = obj.y;

        if (type === "player") {
          if (
            obj.isAwakened &&
            !obj.isAtk &&
            !obj.isCountering &&
            !obj.isParrying &&
            !obj.isCastingQ &&
            !obj.isJumping &&
            !obj.isPreparingJump
          ) {
            useVideo = true;
            videoElement = obj.isMoving ? vWalk : vIdle;
          }
          if (!useVideo) {
            if (obj.isPreparingJump)
              imgKey = obj.isAwakened ? "p_awaken_jump_prep" : "p_jump_prep";
            else if (obj.isAirAtk)
              imgKey = obj.isAwakened ? "p_awaken_jump_atk" : "p_jump_atk";
            else if (obj.isJumping || obj.isFrozen)
              imgKey = obj.isAwakened ? "p_awaken_jump_air" : "p_jump_air";
            else if (obj.isCastingQ) imgKey = "p_cast_q";
            else if (obj.isCountering) imgKey = "p_counter";
            else if (obj.isParrying)
              imgKey =
                obj.parryState === "start" ? "p_parry_start" : "p_parry_main";
            else if (obj.isAtk)
              imgKey = obj.isAwakened
                ? "p_awaken_atk"
                : obj.atkFrame === 0
                  ? "p_atk1"
                  : obj.atkType === 2
                    ? "p_atk_alt"
                    : "p_atk2";
            else if (obj.isMoving) {
              let f = Math.floor(Date.now() / 150) % 2;
              imgKey =
                obj.dir === "right"
                  ? f === 0
                    ? "p_walk1"
                    : "p_walk2"
                  : f === 0
                    ? "p_walkL1"
                    : "p_walkL2";
            } else imgKey = obj.dir === "right" ? "p_idle" : "p_idleL";
            if (obj.dir === "left" && !imgKey.includes("L")) flip = true;
          }
          if (useVideo) {
            drawW = 180;
            drawH = 180;
            drawY = obj.y - (180 - obj.h);
          }
        } else {
          if (obj.state === "skill") {
            useVideo = true;
            videoElement = vBossSkill;
            drawW = 200;
            drawH = 250;
            drawY = obj.y;
          } else {
            imgKey =
              obj.state === "charge"
                ? "b_charge"
                : obj.state === "attack"
                  ? "b_atk"
                  : obj.state === "walk"
                    ? "b_walk"
                    : "b_idle";
            if (
              ((obj.state === "walk" || obj.state === "idle") &&
                obj.dir === "right") ||
              (obj.dir === "left" &&
                (obj.state === "charge" || obj.state === "attack"))
            )
              flip = true;
          }
        }

        ctx.save();
        if (obj.isAwakened && type === "player") {
          ctx.shadowBlur = 25;
          ctx.shadowColor = "gold";
        }
        if (obj.isFrozen && type === "player") {
          ctx.shadowBlur = 30;
          ctx.shadowColor = "white";
        }

        if (flip || (useVideo && obj.dir === "left")) {
          ctx.translate(obj.x + drawW, drawY);
          ctx.scale(-1, 1);
          if (useVideo) {
            const vCanvas =
              type === "player"
                ? drawVideoTransparent(videoElement)
                : drawBossVideoTransparent(videoElement);
            ctx.drawImage(vCanvas, 0, 0, drawW, drawH);
          } else ctx.drawImage(imgs[imgKey], 0, 0, drawW, drawH);
        } else {
          ctx.translate(obj.x, drawY);
          if (useVideo) {
            const vCanvas =
              type === "player"
                ? drawVideoTransparent(videoElement)
                : drawBossVideoTransparent(videoElement);
            ctx.drawImage(vCanvas, 0, 0, drawW, drawH);
          } else ctx.drawImage(imgs[imgKey], 0, 0, drawW, drawH);
        }
        if (type === "boss" && boss.isShielded && boss.state !== "skill") {
          ctx.globalAlpha = boss.shieldAlpha;
          ctx.drawImage(imgs.b_armor, -25, -25, drawW + 50, drawH + 50);
          ctx.globalAlpha = 1;
        }
        ctx.restore();

        // THANH MÁU PLAYER CÓ GIÁP ẢO
        ctx.fillStyle = "rgba(0,0,0,0.5)";
        ctx.fillRect(obj.x, obj.y - 40, obj.w, 10);
        if (type === "player") {
          ctx.fillStyle = "#2ecc71";
          ctx.fillRect(obj.x, obj.y - 40, obj.w * (obj.hp / 100), 10);
          if (player.greyHp > 0) {
            ctx.fillStyle = "rgba(200, 200, 200, 0.8)";
            ctx.fillRect(
              obj.x + obj.w * (obj.hp / 100),
              obj.y - 40,
              obj.w * (player.greyHp / 100),
              10,
            );
          }
          ctx.fillStyle = "rgba(0,0,0,0.5)";
          ctx.fillRect(obj.x, obj.y - 25, obj.w, 8);
          ctx.fillStyle = obj.isAwakened ? "cyan" : "#3498db";
          ctx.fillRect(
            obj.x,
            obj.y - 25,
            obj.w * (obj.stamina / obj.maxStamina),
            8,
          );
          for (let i = 0; i < 5; i++) {
            ctx.strokeStyle = "white";
            ctx.strokeRect(obj.x + i * 28, obj.y - 55, 25, 10);
            if (i < obj.innerEnergy) {
              ctx.fillStyle = "#ffcc00";
              ctx.fillRect(obj.x + i * 28, obj.y - 55, 25, 10);
            }
          }
        } else {
          ctx.fillStyle = "#888";
          ctx.fillRect(
            obj.x,
            obj.y - 40,
            obj.w * ((boss.hp + boss.greyHp) / boss.maxHp),
            10,
          );
          ctx.fillStyle = "#e74c3c";
          ctx.fillRect(obj.x, obj.y - 40, obj.w * (boss.hp / boss.maxHp), 10);
        }
      }

      function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (loaded >= Object.keys(sources).length) {
          ctx.drawImage(imgs.game_map, 0, 0, canvas.width, canvas.height);
          update();
          if (player.hp > 0) drawEntity("player", player);
          if (boss.hp > 0) drawEntity("boss", boss);

          projectiles.forEach((p) => {
            ctx.save();
            ctx.globalAlpha = p.alpha;
            if (p.dir === "left") {
              ctx.translate(p.x + p.w, p.y);
              ctx.scale(-1, 1);
              ctx.drawImage(imgs.p_projectile, 0, 0, p.w, p.h);
            } else ctx.drawImage(imgs.p_projectile, p.x, p.y, p.w, p.h);
            ctx.restore();
          });

          bossProjectiles.forEach((p) => {
            ctx.save();
            ctx.shadowBlur = 25;
            ctx.shadowColor = "#ff2200";
            if (p.dir === "left") {
              ctx.translate(p.x + p.w, p.y);
              ctx.scale(-1, 1);
              ctx.drawImage(imgs.b_skill_atk, 0, 0, p.w, p.h);
            } else {
              ctx.drawImage(imgs.b_skill_atk, p.x, p.y, p.w, p.h);
            }
            ctx.restore();
          });

          if (player.hp <= 0) {
            ctx.fillStyle = "white";
            ctx.font = "bold 60px Arial";
            ctx.textAlign = "center";
            ctx.fillText("GAME OVER", 800, 400);
          }
          if (boss.hp <= 0) {
            ctx.fillStyle = "gold";
            ctx.font = "bold 60px Arial";
            ctx.textAlign = "center";
            ctx.fillText("BOSS DEFEATED!", 800, 400);
          }
        }
        requestAnimationFrame(loop);
      }
      loop();
    </script>
  </body>
</html>
